- id: duolingo
  name: Duolingo
  entry: duolingo/pre-commit-hooks:1.13.3 /entry
  language: docker_image
  types: [text]

- id: precache-docker
  name: Precache Docker images
  entry: ./precache-docker.sh
  language: script
  pass_filenames: false

- id: sync-ai-rules
  name: Sync AI Rules
  entry: duolingo/pre-commit-hooks:1.13.3 sh -c "PYTHONPATH=/ python3 -m sync_ai_rules"
  language: docker_image
  files: &sync_ai_rules_files (^\.cursor/rules/.*\.mdc$|^\.code_review/.*\.md$)
  pass_filenames: false

- id: codex-review
  name: Codex AI Code Review
  description: On-demand AI code review using OpenAI Codex CLI. Requires codex CLI installed and authenticated.
  entry: codex review
  language: system
  pass_filenames: false
  stages: [manual]
  verbose: true

- id: codex-review-pr-grade
  name: Codex AI Code Review (PR-grade)
  description: Profile-aware multi-pass Codex review via ./codexw (auto-generates and auto-syncs local-review-profile.yaml).
  entry: ./codexw review
  language: script
  pass_filenames: false
  stages: [manual]
  verbose: true

- id: codexw
  name: Codex AI Code Review (PR-grade, codexw)
  description: Alias for codex-review-pr-grade. Run with: pre-commit run codexw
  entry: ./codexw review
  language: script
  pass_filenames: false
  stages: [manual]
  verbose: true

# Nobody should ever use these hooks in production. They're just for testing PRs in
# the duolingo/pre-commit-hooks repo more easily without having to tag and push
# temporary images to Docker Hub. Usage: edit a consumer repo's hook config to
# instead declare `id: duolingo-dev` or `id: sync-ai-rules-dev` and `rev: <PR branch SHA>`,
# then run `pre-commit run <hook-id> --all-files`
- id: duolingo-dev
  name: Duolingo (dev)
  entry: /entry
  language: docker
  types: [text]

- id: sync-ai-rules-dev
  name: Sync AI Rules (dev)
  entry: sh -c "PYTHONPATH=/ python3 -m sync_ai_rules"
  language: docker
  files: *sync_ai_rules_files
  pass_filenames: false

- id: codex-review-dev
  name: Codex AI Code Review (dev)
  entry: codex review
  language: system
  pass_filenames: false
  stages: [manual]
  verbose: true

- id: codex-review-pr-grade-dev
  name: Codex AI Code Review (PR-grade, dev)
  entry: ./codexw review
  language: script
  pass_filenames: false
  stages: [manual]
  verbose: true

- id: codexw-dev
  name: Codex AI Code Review (PR-grade, codexw dev)
  entry: ./codexw review
  language: script
  pass_filenames: false
  stages: [manual]
  verbose: true
